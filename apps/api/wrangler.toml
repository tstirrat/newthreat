name = "wow-threat-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
preview_urls = true

[limits]
cpu_ms = 30000

[observability]
enabled = true

[vars]
ENVIRONMENT = "production"
WCL_OAUTH_REDIRECT_URI = "https://wow-threat-api.hardlyworkin.workers.dev/auth/wcl/callback"
FIREBASE_PROJECT_ID = "wow-threat"
FIRESTORE_PROJECT_ID = "wow-threat"
ALLOWED_ORIGINS = "https://wow-threat.web.app,http://localhost:5173,http://localhost:5174"

# KV Namespaces - IDs to be set after creation
[[kv_namespaces]]
binding = "WCL_CACHE"
id = "b3e631b8283b444390326bbb52ccbda3"
preview_id = "b3e631b8283b444390326bbb52ccbda3"

[[kv_namespaces]]
binding = "AUGMENTED_CACHE"
id = "ed12aa0b5d354c84a8874d961b430d54"
preview_id = "ed12aa0b5d354c84a8874d961b430d54"

# Secrets (set via `wrangler secret put`)
# WCL_CLIENT_ID
# WCL_CLIENT_SECRET
# FIREBASE_CLIENT_EMAIL
# FIREBASE_PRIVATE_KEY
# WCL_TOKEN_ENCRYPTION_KEY
# BRIDGE_CODE_SIGNING_SECRET
# SENTRY_DSN

[env.staging]
name = "wow-threat-api-staging"
vars = { ENVIRONMENT = "staging", WCL_OAUTH_REDIRECT_URI = "https://staging-wow-threat-api.hardlyworkin.workers.dev/auth/wcl/callback", FIREBASE_PROJECT_ID = "wow-threat-staging", FIRESTORE_PROJECT_ID = "wow-threat-staging", ALLOWED_ORIGINS = "https://wow-threat-staging.web.app,https://wow-threat-staging.firebaseapp.com,http://localhost:5173,http://localhost:5174" }

# Create KV namespaces first:
#   npx wrangler kv namespace create WCL_CACHE --env staging
#   npx wrangler kv namespace create AUGMENTED_CACHE --env staging
# Then replace the placeholder IDs below with the real ones.
[[env.staging.kv_namespaces]]
binding = "WCL_CACHE"
id = "f50ad7fa5cec42c99009d2ba26c8d244"

[[env.staging.kv_namespaces]]
binding = "AUGMENTED_CACHE"
id = "8b93bb26e54340a2b8650628b09c9e3e"

# Secrets (set via `wrangler secret put --env staging`):
# WCL_CLIENT_ID
# WCL_CLIENT_SECRET
# FIREBASE_CLIENT_EMAIL
# FIREBASE_PRIVATE_KEY
# WCL_TOKEN_ENCRYPTION_KEY
# BRIDGE_CODE_SIGNING_SECRET
# SENTRY_DSN

[env.development]
name = "wow-threat-api-dev"
vars = { ENVIRONMENT = "development", WCL_OAUTH_REDIRECT_URI = "http://localhost:8787/auth/wcl/callback", FIREBASE_PROJECT_ID = "wow-threat-staging", FIRESTORE_PROJECT_ID = "wow-threat-staging", ALLOWED_ORIGINS = "http://localhost:5173,http://localhost:5174" }
# Development behavior:
# - WCL and augmented caches prefer KV (durable across worker reloads)
# - Memory fallback is used only if a KV binding is unavailable
