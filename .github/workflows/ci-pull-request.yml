name: ci-pull-request
on: pull_request

permissions:
  contents: read
  pull-requests: write

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/web/**'
              - 'packages/config/**'
              - 'packages/engine/**'
              - 'packages/shared/**'
              - 'packages/wcl-types/**'
              - 'tooling/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.nvmrc'

  build_test_and_preview:
    needs: detect_changes
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      PREVIEW_CHANNEL_ID: pr-${{ github.event.pull_request.number }}
      PREVIEW_ALLOWED_ORIGINS: 'https://wow-threat.web.app,https://wow-threat.firebaseapp.com,https://wow-threat--*.web.app,https://wow-threat--*.firebaseapp.com,http://localhost:5173,http://localhost:5174'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version-file: .nvmrc
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck && pnpm lint
      - run: pnpm test
      - name: Install Playwright Browsers
        if: ${{ needs.detect_changes.outputs.frontend == 'true' }}
        run: npx playwright install --with-deps chromium
        working-directory: ./apps/web
      - name: Run Playwright tests
        if: ${{ needs.detect_changes.outputs.frontend == 'true' }}
        run: npx playwright test
        working-directory: ./apps/web
      - uses: actions/upload-artifact@v4
        if: ${{ needs.detect_changes.outputs.frontend == 'true' && !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
      - name: Deploy BE Preview
        id: deploy_backend_preview
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: apps/api
          packageManager: pnpm
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            versions upload
            --preview-alias ${{ env.PREVIEW_CHANNEL_ID }}
            --var ALLOWED_ORIGINS:${{ env.PREVIEW_ALLOWED_ORIGINS }}
      - name: Build FE
        run: |
          test -n "$VITE_API_BASE_URL"
          test -n "$VITE_FIREBASE_API_KEY"
          test -n "$VITE_FIREBASE_PROJECT_ID"
          test -n "$VITE_FIREBASE_AUTH_DOMAIN"
          test -n "$VITE_FIREBASE_APP_ID"
          pnpm --filter @wow-threat/web build
        env:
          VITE_API_BASE_URL: ${{ steps.deploy_backend_preview.outputs.deployment-url }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        id: deploy_frontend_preview
        name: Deploy FE Preview
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_WOW_THREAT }}
          channelId: ${{ env.PREVIEW_CHANNEL_ID }}
          disableComment: true
          entryPoint: apps/web
          projectId: wow-threat
      - name: Resolve FE Preview URL
        id: resolve_frontend_preview
        env:
          FRONTEND_DETAILS_URL: ${{ steps.deploy_frontend_preview.outputs.details_url }}
          FRONTEND_URLS: ${{ steps.deploy_frontend_preview.outputs.urls }}
        run: |
          set -euo pipefail

          frontend_preview_url="$FRONTEND_DETAILS_URL"
          if [ -z "$frontend_preview_url" ]; then
            frontend_preview_url="$(
              printf '%s' "$FRONTEND_URLS" | cut -d ',' -f 1 | xargs
            )"
          fi

          if [ -z "$frontend_preview_url" ]; then
            echo 'Failed to extract a frontend preview URL from firebase output.' >&2
            exit 1
          fi

          echo "url=$frontend_preview_url" >> "$GITHUB_OUTPUT"
      - name: Add preview URLs to workflow summary
        run: |
          echo "### Preview Environments" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: ${{ steps.resolve_frontend_preview.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend: ${{ steps.deploy_backend_preview.outputs.deployment-url }}" >> "$GITHUB_STEP_SUMMARY"
      - name: Comment preview URLs on PR
        uses: actions/github-script@v7
        env:
          BACKEND_PREVIEW_URL: ${{ steps.deploy_backend_preview.outputs.deployment-url }}
          FRONTEND_PREVIEW_URL: ${{ steps.resolve_frontend_preview.outputs.url }}
        with:
          script: |
            const marker = '<!-- wow-threat-preview-urls -->'
            const backendPreviewUrl = process.env.BACKEND_PREVIEW_URL
            const frontendPreviewUrl = process.env.FRONTEND_PREVIEW_URL

            if (!backendPreviewUrl || !frontendPreviewUrl) {
              core.setFailed('Missing preview URL output(s).')
              return
            }

            const body = [
              marker,
              '## Preview Environments',
              '',
              `- Frontend: ${frontendPreviewUrl}`,
              `- Backend: ${backendPreviewUrl}`,
            ].join('\n')

            const { owner, repo } = context.repo
            const issueNumber = context.issue.number

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number: issueNumber,
                per_page: 100,
              }
            )

            const existingComment = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' && comment.body?.includes(marker),
            )

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body,
              })
            }
