name: ci-pull-request
on: pull_request

permissions:
  checks: write
  contents: read
  issues: write
  pull-requests: write

jobs:
  detect_changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'apps/web/**'
              - 'packages/config/**'
              - 'packages/engine/**'
              - 'packages/shared/**'
              - 'packages/wcl-types/**'
              - 'tooling/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'turbo.json'
              - '.nvmrc'

  build_and_test:
    needs: detect_changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version-file: .nvmrc
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck && pnpm lint
      - run: pnpm test
      - name: Install Playwright Browsers
        if: ${{ needs.detect_changes.outputs.frontend == 'true' }}
        run: npx playwright install --with-deps chromium
        working-directory: ./apps/web
      - name: Run Playwright tests
        if: ${{ needs.detect_changes.outputs.frontend == 'true' }}
        run: npx playwright test
        working-directory: ./apps/web
      - uses: actions/upload-artifact@v4
        if: ${{ needs.detect_changes.outputs.frontend == 'true' && !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  deploy_preview:
    needs: detect_changes
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    env:
      PREVIEW_CHANNEL_ID: pr-${{ github.event.pull_request.number }}
      PREVIEW_ALLOWED_ORIGINS: 'https://wow-threat-staging.web.app,https://wow-threat-staging.firebaseapp.com,https://wow-threat-staging--*.web.app,https://wow-threat-staging--*.firebaseapp.com,http://localhost:5173,http://localhost:5174'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version-file: .nvmrc
      - run: pnpm install --frozen-lockfile
      - name: Deploy BE Preview
        id: deploy_backend_preview
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: apps/api
          packageManager: pnpm
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            versions upload
            --preview-alias ${{ env.PREVIEW_CHANNEL_ID }}
            --var ALLOWED_ORIGINS:${{ env.PREVIEW_ALLOWED_ORIGINS }}
      - name: Smoke test BE preview
        run: |
          PREVIEW_URL="${{ steps.deploy_backend_preview.outputs.deployment-url }}"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w '%{http_code}' "${PREVIEW_URL}/health")
            if [ "$STATUS" = "200" ]; then
              BODY=$(curl -sf "${PREVIEW_URL}/health")
              HEALTH_STATUS=$(echo "$BODY" | jq -r '.status')
              if [ "$HEALTH_STATUS" = "ok" ] || [ "$HEALTH_STATUS" = "degraded" ]; then
                echo "BE preview healthy at ${PREVIEW_URL} (status=$HEALTH_STATUS)"
                exit 0
              fi
              echo "Attempt $i: status=$HEALTH_STATUS (expected ok or degraded)"
            else
              echo "Attempt $i: HTTP $STATUS (expected 200)"
            fi
            sleep $((i * 2))
          done
          echo "BE preview smoke test failed"
          exit 1
      - name: Build FE
        run: |
          test -n "$VITE_API_BASE_URL"
          test -n "$VITE_FIREBASE_API_KEY"
          test -n "$VITE_FIREBASE_PROJECT_ID"
          test -n "$VITE_FIREBASE_AUTH_DOMAIN"
          test -n "$VITE_FIREBASE_APP_ID"
          test -n "$VITE_SENTRY_DSN"
          test -n "$VITE_POSTHOG_KEY"
          pnpm --filter @wow-threat/web build
        env:
          VITE_API_BASE_URL: ${{ steps.deploy_backend_preview.outputs.deployment-url }}
          VITE_FIREBASE_API_KEY: ${{ secrets.STAGING_FIREBASE_API_KEY }}
          VITE_FIREBASE_PROJECT_ID: wow-threat-staging
          VITE_FIREBASE_AUTH_DOMAIN: wow-threat-staging.firebaseapp.com
          VITE_FIREBASE_APP_ID: ${{ secrets.STAGING_FIREBASE_APP_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
      - uses: FirebaseExtended/action-hosting-deploy@v0
        id: deploy_frontend_preview
        name: Deploy FE Preview
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}
          channelId: ${{ env.PREVIEW_CHANNEL_ID }}
          disableComment: true
          entryPoint: apps/web
          projectId: wow-threat-staging
      - name: Validate FE Preview output
        env:
          FRONTEND_DETAILS_URL: ${{ steps.deploy_frontend_preview.outputs.details_url }}
        run: |
          test -n "$FRONTEND_DETAILS_URL"
      - name: Smoke test FE preview
        run: |
          PREVIEW_URL="${{ steps.deploy_frontend_preview.outputs.details_url }}"
          for i in 1 2 3 4 5; do
            RESPONSE=$(curl -sf "$PREVIEW_URL" || true)
            if echo "$RESPONSE" | grep -q '<div id="root">' && \
               echo "$RESPONSE" | grep -q '</html>'; then
              echo "FE preview responding at ${PREVIEW_URL}"
              exit 0
            fi
            echo "Attempt $i: HTML markers not found, retrying..."
            sleep $((i * 3))
          done
          echo "FE preview smoke test failed"
          exit 1
      - name: Add preview URLs to workflow summary
        run: |
          echo "### Preview Environments" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend: ${{ steps.deploy_frontend_preview.outputs.details_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend Expires (UTC): ${{ steps.deploy_frontend_preview.outputs.expire_time_formatted }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend: ${{ steps.deploy_backend_preview.outputs.deployment-url }}" >> "$GITHUB_STEP_SUMMARY"
      - name: Find existing preview URL comment
        id: find_preview_comment
        uses: peter-evans/find-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: '<!-- wow-threat-preview-urls -->'
      - name: Create or update preview URL comment
        uses: peter-evans/create-or-update-comment@v5
        with:
          comment-id: ${{ steps.find_preview_comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            <!-- wow-threat-preview-urls -->
            ## Preview Environments

            - Frontend: ${{ steps.deploy_frontend_preview.outputs.details_url }}
            - Frontend Expires (UTC): ${{ steps.deploy_frontend_preview.outputs.expire_time_formatted }}
            - Backend: ${{ steps.deploy_backend_preview.outputs.deployment-url }}
