version: 2
updates:
  # Single root entry for the pnpm workspace monorepo. Dependabot reads
  # pnpm-workspace.yaml from here and updates all workspace package.json
  # files together with the root pnpm-lock.yaml in the same PR.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    ignore:
      # react-router-dom v7 causes a "Maximum update depth exceeded" infinite
      # render loop handled by React Router's ErrorBoundary. Root cause is
      # likely a Radix UI / shadcn component calling setState inside a ref
      # callback on every render, which v7's changed rendering cycle exposes.
      - dependency-name: react-router-dom
        update-types: ["version-update:semver-major"]
